<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Menu</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-hover: #e8f5e9;
      --border: #e0e0e0;
      --text: #333333;
      --text-secondary: #666666;
      --accent: #10b981;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg-hover: #2a2a2a;
        --border: #3a3a3a;
        --text: #ffffff;
        --text-secondary: #a0a0a0;
        --accent: #34d399;
      }
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
      font-size: 16px;
      line-height: 1.5;
      min-width: 180px;
      max-width: 260px;
    }
    .menu-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s;
      color: var(--text);
    }
    .menu-item:hover {
      background: var(--bg-hover);
    }
    .menu-item.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .menu-item.disabled:hover {
      background: transparent;
    }
    .menu-item-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .menu-item-label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .menu-item-shortcut {
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .menu-separator {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }
    .menu-submenu-indicator {
      width: 12px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="menu-container" id="menuContainer"></div>
  <script>
    const { ipcRenderer, contextBridge } = require('electron');

    const menuContainer = document.getElementById('menuContainer');
    let menuData = null;

    function renderMenu(items) {
      menuContainer.innerHTML = '';
      for (const item of items) {
        if (item.type === 'separator') {
          const sep = document.createElement('div');
          sep.className = 'menu-separator';
          menuContainer.appendChild(sep);
          continue;
        }
        const el = document.createElement('div');
        el.className = `menu-item${item.enabled === false ? ' disabled' : ''}`;
        el.dataset.id = item.id;
        if (item.id && item.enabled !== false) {
          el.addEventListener('click', () => {
            ipcRenderer.invoke('context-menu:click', item.id);
          });
        }
        let html = '';
        if (item.icon) {
          html += `<div class="menu-item-icon">${item.icon}</div>`;
        } else {
          html += `<div class="menu-item-icon"></div>`;
        }
        html += `<div class="menu-item-label">${escapeHtml(item.label)}</div>`;
        if (item.shortcut) {
          html += `<div class="menu-item-shortcut">${item.shortcut}</div>`;
        }
        if (item.submenu) {
          html += `<div class="menu-submenu-indicator">›</div>`;
        }
        el.innerHTML = html;
        menuContainer.appendChild(el);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
    }

    ipcRenderer.on('context-menu:show', (e, data) => {
      menuData = data;
      renderMenu(data.items);
    });

    ipcRenderer.on('context-menu:close', () => {
      menuContainer.innerHTML = '';
      menuData = null;
    });
  </script>
</body>
</html>
